<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common(#{reviews.title})}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1 th:text="#{reviews.title}">Reviews</h1>

    <p th:if="${#lists.isEmpty(reviews)}" th:text="#{message.noReviewsYet}">
      No reviews yet.
    </p>

    <div th:each="review : ${reviews}">
      <h3>
        <a
          th:if="${review.user != null}"
          th:href="@{/users/{id}(id=${review.user.id})}"
          th:text="${review.user.username}"
        ></a>
        <span th:if="${review.user == null}" th:text="#{label.anonymous}"
          >Anonymous</span
        >
      </h3>
      <strong th:text="${review.rating} + '/100'"></strong>
      <h3 th:text="${review.title}"></h3>
      <p th:text="${review.content}"></p>

      <a
        th:if="${#authentication != null and (#authorization.expression('hasRole(''ADMIN'')') or (review.user != null and #authentication.name == review.user.username))}"
        th:href="@{/reviews/edit/{id}(id=${review.id})}"
        th:text="#{button.edit}"
      >
        Edit
      </a>
      <a
        th:if="${#authentication != null and (#authorization.expression('hasRole(''ADMIN'')') or (review.user != null and #authentication.name == review.user.username))}"
        th:href="@{/reviews/delete/{id}(id=${review.id})}"
        th:text="#{button.delete}"
      >
        Delete
      </a>
    </div>
  </body>
</html>
