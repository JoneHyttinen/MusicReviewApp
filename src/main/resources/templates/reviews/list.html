<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Reviews</title>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1>Reviews</h1>

    <p th:if="${#lists.isEmpty(reviews)}">No reviews yet.</p>

    <div th:each="review : ${reviews}">
      <h3 th:text="${review.title}"></h3>
      <p th:text="${review.content}"></p>
      <p>
        <span th:text="${review.album.title}"></span>
        <span
          th:if="${review.user != null}"
          th:text="${'by ' + review.user.username}"
        ></span>
      </p>
      <strong th:text="${review.rating} + '/100'"></strong>

      <a
        sec:authorize="hasRole('ADMIN') or (review.user != null and #authentication.name == review.user.username)"
        th:href="@{/reviews/delete/{id}(id=${review.id})}"
      >
        Delete
      </a>
    </div>
  </body>
</html>
