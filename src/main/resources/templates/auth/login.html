<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: common('Login')}"></head>
  <body class="auth-page">
    <main class="auth-card">
      <p class="eyebrow">Music Review</p>
      <h1>Login</h1>

      <p class="status-message" th:if="${param.registered}">
        Registration successful. You can log in now.
      </p>
      <p class="status-message error" th:if="${param.error}">
        Invalid username or password.
      </p>
      <p class="status-message" th:if="${param.logout}">
        You have been logged out.
      </p>

      <form th:action="@{/login}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />

        <div>
          <label>Username:</label>
          <input type="text" name="username" />
        </div>

        <div>
          <label>Password:</label>
          <input type="password" name="password" />
        </div>

        <button type="submit">Login</button>
      </form>

      <a class="button-link button-link--secondary" href="/albums"
        >Continue as guest</a
      >
      <a href="/register">Register</a>
    </main>
  </body>
</html>
