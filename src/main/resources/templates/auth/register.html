<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments/head :: common(#{title.register})}"></head>
  <body class="auth-page">
    <main class="auth-card">
      <p class="eyebrow" th:text="#{auth.register.joinCommunity}">
        Join the community
      </p>
      <h1 th:text="#{title.register}">Register</h1>

      <form th:action="@{/register}" th:object="${user}" method="post">
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />

        <div>
          <label th:text="#{form.username} + ':'">Username:</label>
          <input type="text" th:field="*{username}" />
          <p
            class="status-message error"
            th:if="${#fields.hasErrors('username')}"
            th:errors="*{username}"
          ></p>
        </div>

        <div>
          <label th:text="#{form.email} + ':'">Email:</label>
          <input type="email" th:field="*{email}" />
          <p
            class="status-message error"
            th:if="${#fields.hasErrors('email')}"
            th:errors="*{email}"
          ></p>
        </div>

        <div>
          <label th:text="#{form.password} + ':'">Password:</label>
          <input type="password" th:field="*{password}" />
          <p
            class="status-message error"
            th:if="${#fields.hasErrors('password')}"
            th:errors="*{password}"
          ></p>
        </div>

        <button type="submit" th:text="#{auth.register.createAccount}">
          Create account
        </button>
      </form>

      <a
        class="button-link button-link--secondary"
        href="/albums"
        th:text="#{auth.continueNoLogin}"
        >Continue without logging in</a
      >
      <a href="/login" th:text="#{title.login}">Login</a>
    </main>
  </body>
</html>
