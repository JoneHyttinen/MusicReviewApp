<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common('Album Form')}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1>Add / Edit Album</h1>

    <form th:action="@{/albums}" th:object="${album}" method="post">
      <input
        type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"
      />

      <input type="hidden" th:field="*{id}" />

      <div>
        <label>Title:</label>
        <input type="text" th:field="*{title}" />
      </div>

      <div>
        <label>Release Year:</label>
        <input type="number" th:field="*{releaseYear}" />
      </div>

      <div>
        <label>Genre:</label>
        <input
          type="text"
          th:field="*{genre}"
          placeholder="e.g., Alternative Rock"
        />
      </div>

      <div>
        <label>Description:</label>
        <textarea th:field="*{description}"></textarea>
      </div>

      <div>
        <label>Cover Image URL:</label>
        <input
          type="url"
          th:field="*{coverImageUrl}"
          placeholder="/images/album-ok-computer.svg or https://..."
        />
      </div>

      <div>
        <label>Artist:</label>
        <select th:field="*{artist.id}">
          <option
            th:each="artist : ${artists}"
            th:value="${artist.id}"
            th:text="${artist.name}"
          ></option>
        </select>
      </div>

      <button type="submit">Save</button>
    </form>

    <a href="/albums">Back</a>
  </body>
</html>
