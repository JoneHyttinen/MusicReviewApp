<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Album Details</title>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1 th:text="${album.title}"></h1>
    <h3 th:text="${album.artist.name}"></h3>

    <p th:text="${album.description}"></p>

    <a
      sec:authorize="isAuthenticated()"
      th:href="@{/reviews/new/{id}(id=${album.id})}"
    >
      Add Review
    </a>

    <h2>Reviews</h2>

    <p th:if="${#lists.isEmpty(reviews)}">No reviews yet.</p>

    <div th:each="review : ${reviews}">
      <h4 th:text="${review.title}"></h4>
      <p th:text="${review.content}"></p>
      <strong th:text="${review.rating} + '/100'"></strong>
      <p th:if="${review.user != null}">
        <a
          th:href="@{/users/{id}(id=${review.user.id})}"
          th:text="${'By ' + review.user.username}"
        ></a>
      </p>

      <a
        sec:authorize="hasRole('ADMIN') or (review.user != null and #authentication.name == review.user.username)"
        th:href="@{/reviews/delete/{id}(id=${review.id})}"
      >
        Delete
      </a>
    </div>

    <a href="/albums">Back</a>
  </body>
</html>
