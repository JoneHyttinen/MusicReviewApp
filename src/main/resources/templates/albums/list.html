<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common('Albums')}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1>Albums</h1>

    <a sec:authorize="hasRole('ADMIN')" href="/albums/new">Add Album</a>

    <p th:if="${#maps.isEmpty(albumsByGenre)}">No albums found.</p>

    <div th:each="entry : ${albumsByGenre}">
      <h2 th:text="${entry.key}"></h2>
      <ul class="catalog-grid">
        <li
          class="catalog-card catalog-card--album"
          th:each="album : ${entry.value}"
        >
          <a
            class="catalog-card__image-link"
            th:href="@{/albums/{id}(id=${album.id})}"
          >
            <img
              class="catalog-card__image"
              th:src="${album.coverImageUrl != null and !#strings.isEmpty(album.coverImageUrl) ? album.coverImageUrl : '/images/album-placeholder.svg'}"
              th:alt="${album.title + ' cover'}"
            />
          </a>

          <div class="catalog-card__body">
            <a
              class="catalog-card__title"
              th:href="@{/albums/{id}(id=${album.id})}"
              th:text="${album.title}"
            ></a>
            <a
              class="catalog-card__subtitle"
              th:href="@{/artists/{id}(id=${album.artist.id})}"
              th:text="${album.artist.name}"
            ></a>
            <span
              class="catalog-card__meta"
              th:text="${album.releaseYear}"
            ></span>

            <div class="catalog-card__actions">
              <a
                sec:authorize="hasRole('ADMIN')"
                th:href="@{/albums/edit/{id}(id=${album.id})}"
                >Edit</a
              >
              <a
                sec:authorize="hasRole('ADMIN')"
                th:href="@{/albums/delete/{id}(id=${album.id})}"
                >Delete</a
              >
            </div>
          </div>
        </li>
      </ul>
    </div>
  </body>
</html>
