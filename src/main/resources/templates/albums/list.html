<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Albums</title>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1>Albums</h1>

    <a sec:authorize="hasRole('ADMIN')" href="/albums/new">Add Album</a>

    <p th:if="${#maps.isEmpty(albumsByGenre)}">No albums found.</p>

    <div th:each="entry : ${albumsByGenre}">
      <h2 th:text="${entry.key}"></h2>
      <ul>
        <li th:each="album : ${entry.value}">
          <span th:text="${album.title}"></span> -
          <a
            th:href="@{/artists/{id}(id=${album.artist.id})}"
            th:text="${album.artist.name}"
          ></a>

          <a th:href="@{/albums/{id}(id=${album.id})}">View</a>

          <a
            sec:authorize="hasRole('ADMIN')"
            th:href="@{/albums/edit/{id}(id=${album.id})}"
            >Edit</a
          >
          <a
            sec:authorize="hasRole('ADMIN')"
            th:href="@{/albums/delete/{id}(id=${album.id})}"
            >Delete</a
          >
        </li>
      </ul>
    </div>
  </body>
</html>
