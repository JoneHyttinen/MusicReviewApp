<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Albums</title>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1>Albums</h1>

    <a sec:authorize="hasRole('ADMIN')" href="/albums/new">Add Album</a>

    <ul>
      <li th:each="album : ${albums}">
        <span th:text="${album.title}"></span> -
        <span th:text="${album.artist.name}"></span>

        <a th:href="@{/albums/{id}(id=${album.id})}">View</a>

        <a
          sec:authorize="hasRole('ADMIN')"
          th:href="@{/albums/edit/{id}(id=${album.id})}"
          >Edit</a
        >
        <a
          sec:authorize="hasRole('ADMIN')"
          th:href="@{/albums/delete/{id}(id=${album.id})}"
          >Delete</a
        >
      </li>
    </ul>
  </body>
</html>
