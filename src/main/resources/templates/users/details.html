<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common(#{title.userProfile})}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <section class="profile-hero">
      <img
        class="profile-hero__avatar"
        th:src="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl) ? user.profileImageUrl : '/images/user-placeholder.svg'}"
        th:alt="${user.username + ' profile picture'}"
      />

      <div class="profile-hero__content">
        <p class="eyebrow" th:text="#{title.userProfile}">User Profile</p>
        <h1 th:text="${user.username}"></h1>

        <div class="profile-stats">
          <div class="profile-stat">
            <span class="profile-stat__label" th:text="#{label.joined}"
              >Joined</span
            >
            <strong th:text="${user.joinDate}"></strong>
          </div>
          <div class="profile-stat">
            <span class="profile-stat__label" th:text="#{reviews.title}"
              >Reviews</span
            >
            <strong th:text="${reviewCount}"></strong>
          </div>
          <div class="profile-stat">
            <span class="profile-stat__label" th:text="#{label.averageRating}"
              >Average rating</span
            >
            <strong
              th:text="${#numbers.formatDecimal(averageRating, 1, 2)} + '/100'"
            ></strong>
          </div>
        </div>

        <div
          th:if="${user.bio != null and !#strings.isEmpty(user.bio)}"
          class="profile-bio"
        >
          <p th:text="${user.bio}"></p>
        </div>

        <div
          th:if="${user.favoriteGenre != null and !#strings.isEmpty(user.favoriteGenre)}"
          class="profile-genre"
        >
          <span
            ><span th:text="#{label.favoriteGenre}">Favorite Genre</span>:
            <strong th:text="${user.favoriteGenre}"></strong
          ></span>
        </div>

        <div class="profile-actions">
          <a
            sec:authorize="isAuthenticated()"
            th:if="${#authentication.name == user.username}"
            class="button-link"
            th:href="@{/users/{id}/edit(id=${user.id})}"
          >
            <span th:text="#{title.editProfile}">Edit Profile</span>
          </a>
        </div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-card__header">
        <h2 th:text="#{label.recentReviews}">Recent Reviews</h2>
      </div>

      <p th:if="${#lists.isEmpty(recentReviews)}">
        <span th:text="#{message.userNoReviews}"
          >This user has not posted reviews yet.</span
        >
      </p>

      <div class="review-stack" th:if="${!#lists.isEmpty(recentReviews)}">
        <article
          class="profile-review-card"
          th:each="review : ${recentReviews}"
        >
          <a
            class="profile-review-card__image-link"
            th:href="@{/albums/{id}(id=${review.album.id})}"
          >
            <img
              class="profile-review-card__image"
              th:src="${review.album.coverImageUrl != null and !#strings.isEmpty(review.album.coverImageUrl) ? review.album.coverImageUrl : '/images/album-placeholder.svg'}"
              th:alt="${review.album.title + ' cover'}"
            />
          </a>

          <div class="profile-review-card__body">
            <h3 class="profile-review-card__user">
              <a
                th:if="${review.user != null}"
                th:href="@{/users/{id}(id=${review.user.id})}"
                th:text="${review.user.username}"
              ></a>
              <span th:if="${review.user == null}" th:text="#{label.anonymous}"
                >Anonymous</span
              >
            </h3>

            <strong
              class="profile-review-card__score"
              th:text="${review.rating} + '/100'"
            ></strong>
            <h3
              class="profile-review-card__title"
              th:text="${review.title}"
            ></h3>
            <p th:text="${review.content}"></p>
            <a
              th:if="${#authentication != null and (#authorization.expression('hasRole(''ADMIN'')') or (review.user != null and #authentication.name == review.user.username))}"
              th:href="@{/reviews/edit/{id}(id=${review.id})}"
              th:text="#{button.edit}"
            >
              Edit
            </a>
            <a
              th:if="${#authentication != null and (#authorization.expression('hasRole(''ADMIN'')') or (review.user != null and #authentication.name == review.user.username))}"
              th:href="@{/reviews/delete/{id}(id=${review.id})}"
              th:text="#{button.delete}"
            >
              Delete
            </a>
          </div>
        </article>
      </div>
    </section>
  </body>
</html>
