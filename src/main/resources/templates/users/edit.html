<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common(#{title.editProfile})}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <section class="form-section">
      <div class="form-container">
        <h1 th:text="#{title.editProfile}">Edit Profile</h1>

        <form
          th:action="@{/users/{id}(id=${user.id})}"
          th:object="${user}"
          method="POST"
          enctype="multipart/form-data"
        >
          <p th:if="${param.uploadError}" class="form-error-message">
            <span th:text="#{message.imageUploadFailed}"
              >Image upload failed. Please use a jpg, jpeg, png, gif, or webp
              file.</span
            >
          </p>

          <div class="form-group">
            <label for="profileImage" th:text="#{form.profilePicture}"
              >Profile Picture</label
            >
            <input
              type="file"
              id="profileImage"
              name="profileImage"
              accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
            />
          </div>

          <div class="form-group">
            <label for="bio" th:text="#{form.bio}">Bio</label>
            <textarea
              id="bio"
              name="bio"
              th:field="*{bio}"
              placeholder="Tell us about yourself"
              rows="4"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="favoriteGenre" th:text="#{form.favoriteGenre}"
              >Favorite Genre</label
            >
            <input
              type="text"
              id="favoriteGenre"
              name="favoriteGenre"
              th:field="*{favoriteGenre}"
              placeholder="e.g., Rock, Jazz, Electronic"
            />
          </div>

          <div class="form-actions">
            <button
              type="submit"
              class="button-link"
              th:text="#{button.saveChanges}"
            >
              Save changes
            </button>
            <a
              th:href="@{/users/{id}(id=${user.id})}"
              class="button-link button-link--secondary"
            >
              <span th:text="#{button.cancel}">Cancel</span>
            </a>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
