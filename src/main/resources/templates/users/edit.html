<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common('Edit Profile')}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <section class="form-section">
      <div class="form-container">
        <h1>Edit Profile</h1>

        <form
          th:action="@{/users/{id}(id=${user.id})}"
          th:object="${user}"
          method="POST"
        >
          <div class="form-group">
            <label for="bio">Bio</label>
            <textarea
              id="bio"
              name="bio"
              th:field="*{bio}"
              placeholder="Tell us about yourself"
              rows="4"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="favoriteGenre">Favorite Genre</label>
            <input
              type="text"
              id="favoriteGenre"
              name="favoriteGenre"
              th:field="*{favoriteGenre}"
              placeholder="e.g., Rock, Jazz, Electronic"
            />
          </div>

          <div class="form-actions">
            <button type="submit" class="button-link">Save changes</button>
            <a
              th:href="@{/users/{id}(id=${user.id})}"
              class="button-link button-link--secondary"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
