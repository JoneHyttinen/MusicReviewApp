<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common(#{title.artistDetails})}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <section class="detail-hero detail-hero--artist">
      <img
        class="detail-hero__image detail-hero__image--artist"
        th:src="${artist.imageUrl != null and !#strings.isEmpty(artist.imageUrl) ? artist.imageUrl : '/images/artist-placeholder.svg'}"
        th:alt="${artist.name + ' portrait'}"
      />

      <div class="detail-hero__content">
        <p class="eyebrow" th:text="${artist.genre}"></p>
        <h1 th:text="${artist.name}"></h1>
        <p th:text="${artist.description}"></p>
        <p
          class="detail-hero__rating"
          th:if="${artistAverageRating != null}"
          th:text="${#messages.msg('label.averageRating') + ': ' + #numbers.formatDecimal(artistAverageRating, 1, 2) + '/100'}"
        ></p>
        <p
          class="detail-hero__rating"
          th:if="${artistAverageRating == null}"
          th:text="${#messages.msg('label.averageRating') + ': ' + #messages.msg('label.unknown')}"
        ></p>
      </div>
    </section>

    <section class="section-card">
      <div class="section-card__header">
        <h2 th:text="#{albums.title}">Albums</h2>
      </div>

      <p
        th:if="${#lists.isEmpty(albums)}"
        th:text="#{message.noAlbumsForArtist}"
      >
        No albums found for this artist.
      </p>

      <ul
        class="catalog-grid catalog-grid--compact"
        th:if="${!#lists.isEmpty(albums)}"
      >
        <li
          class="catalog-card catalog-card--album"
          th:each="album : ${albums}"
        >
          <a
            class="catalog-card__image-link"
            th:href="@{/albums/{id}(id=${album.id})}"
          >
            <img
              class="catalog-card__image"
              th:src="${album.coverImageUrl != null and !#strings.isEmpty(album.coverImageUrl) ? album.coverImageUrl : '/images/album-placeholder.svg'}"
              th:alt="${album.title + ' cover'}"
            />
          </a>

          <div class="catalog-card__body">
            <a
              class="catalog-card__title"
              th:href="@{/albums/{id}(id=${album.id})}"
              th:text="${album.title}"
            ></a>
            <span
              class="catalog-card__subtitle"
              th:text="${album.releaseYear}"
            ></span>
            <span
              class="catalog-card__meta"
              th:if="${albumAverageRatings.get(album.id) != null}"
              th:text="${#messages.msg('label.averageRating') + ': ' + #numbers.formatDecimal(albumAverageRatings.get(album.id), 1, 2) + '/100'}"
            ></span>
            <span
              class="catalog-card__meta"
              th:if="${albumAverageRatings.get(album.id) == null}"
              th:text="${#messages.msg('label.averageRating') + ': ' + #messages.msg('label.unknown')}"
            ></span>
          </div>
        </li>
      </ul>
    </section>

    <a class="back-link" href="/artists" th:text="#{button.back}">Back</a>
  </body>
</html>
