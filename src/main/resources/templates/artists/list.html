<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <title>Artists</title>
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1>Artists</h1>

    <a sec:authorize="hasRole('ADMIN')" href="/artists/new">Add Artist</a>

    <form method="get" action="/artists">
      <input
        type="text"
        name="keyword"
        placeholder="Search..."
        th:value="${keyword}"
      />
      <button type="submit">Search</button>
    </form>

    <p th:if="${#maps.isEmpty(artistsByGenre)}">No artists found.</p>

    <div th:each="entry : ${artistsByGenre}">
      <h2 th:text="${entry.key}"></h2>
      <ul>
        <li th:each="artist : ${entry.value}">
          <a
            th:href="@{/artists/{id}(id=${artist.id})}"
            th:text="${artist.name}"
          ></a>
          <a
            sec:authorize="hasRole('ADMIN')"
            th:href="@{/artists/edit/{id}(id=${artist.id})}"
            >Edit</a
          >
          <a
            sec:authorize="hasRole('ADMIN')"
            th:href="@{/artists/delete/{id}(id=${artist.id})}"
            >Delete</a
          >
        </li>
      </ul>
    </div>
  </body>
</html>
