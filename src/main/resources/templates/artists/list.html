<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{fragments/head :: common(#{artists.title})}"></head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <h1 th:text="#{artists.title}">Artists</h1>

    <a
      sec:authorize="hasRole('ADMIN')"
      href="/artists/new"
      th:text="#{button.addArtist}"
      >Add Artist</a
    >

    <form method="get" action="/artists">
      <input
        type="text"
        name="keyword"
        th:placeholder="#{button.search} + '...'"
        th:value="${keyword}"
      />
      <button type="submit" th:text="#{button.search}">Search</button>
    </form>

    <p
      th:if="${#maps.isEmpty(artistsByGenre)}"
      th:text="#{message.noArtistsFound}"
    >
      No artists found.
    </p>

    <div th:each="entry : ${artistsByGenre}">
      <h2 th:text="${entry.key}"></h2>
      <ul class="catalog-grid catalog-grid--artists">
        <li
          class="catalog-card catalog-card--artist"
          th:each="artist : ${entry.value}"
        >
          <a
            class="catalog-card__image-link"
            th:href="@{/artists/{id}(id=${artist.id})}"
          >
            <img
              class="catalog-card__image catalog-card__image--artist"
              th:src="${artist.imageUrl != null and !#strings.isEmpty(artist.imageUrl) ? artist.imageUrl : '/images/artist-placeholder.svg'}"
              th:alt="${artist.name + ' portrait'}"
            />
          </a>

          <div class="catalog-card__body">
            <a
              class="catalog-card__title"
              th:href="@{/artists/{id}(id=${artist.id})}"
              th:text="${artist.name}"
            ></a>
            <span
              class="catalog-card__subtitle"
              th:text="${artist.genre}"
            ></span>

            <div class="catalog-card__actions">
              <a
                sec:authorize="hasRole('ADMIN')"
                th:href="@{/artists/edit/{id}(id=${artist.id})}"
                th:text="#{button.edit}"
                >Edit</a
              >
              <a
                sec:authorize="hasRole('ADMIN')"
                th:href="@{/artists/delete/{id}(id=${artist.id})}"
                th:text="#{button.delete}"
                >Delete</a
              >
            </div>
          </div>
        </li>
      </ul>
    </div>
  </body>
</html>
