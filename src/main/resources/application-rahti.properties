# PostgreSQL DATABASE (Rahti)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_JDBC_URL:jdbc:postgresql://${DB_HOST:postgresql}:${DB_PORT:5432}/${DB_NAME:postgres}}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Profile image uploads
app.upload.dir=${APP_UPLOAD_DIR:/tmp/uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
